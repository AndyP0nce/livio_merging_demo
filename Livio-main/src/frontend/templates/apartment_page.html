{% extends "base_home.html" %}
{% load static %}

{% block page_identifier %}apartments{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/apartment_styles.css' %}">
<link rel="stylesheet" href="{% static 'css/apartment_map.css' %}">
<link rel="stylesheet" href="{% static 'css/apartment_cards.css' %}">
<link rel="stylesheet" href="{% static 'css/apartment_filters.css' %}">
<link rel="stylesheet" href="{% static 'css/apartment_detail_modal.css' %}">
<link rel="stylesheet" href="{% static 'css/apartment_create_modal.css' %}">
{% endblock %}

{% block content %}

<!-- ── Zillow-style two-column layout ───────────────── -->
<main class="apt-app-layout">

  <!-- Left sidebar: scrollable listing cards -->
  <aside class="listings-panel">
    <div class="listings-panel__header">
      <div class="listings-panel__header-text">
        <h2 class="listings-panel__title" id="listings-count">Loading...</h2>
        <p class="listings-panel__subtitle">in current map view</p>
      </div>
      <button class="apt-list-btn" id="btn-list-place">+ List Your Place</button>
    </div>
    <!-- CardRenderer renders listing cards here -->
    <div class="listings-panel__list" id="listings-container"></div>
  </aside>

  <!-- Right panel: filter toolbar sits above the map -->
  <section class="map-panel">
    <!-- FilterManager renders the search + dropdown toolbar here -->
    <div id="filter-container"></div>
    <!-- Google Maps attaches here -->
    <div class="map-panel__map" id="map-container"></div>
  </section>

</main>

<!-- Full-detail listing modal (ListingModal renders here) -->
<div class="detail-modal" id="detail-modal"></div>

<!-- Create-listing modal (CreateListingModal renders here) -->
<div class="create-modal" id="create-listing-modal"></div>

<!--
  Google Maps JavaScript API
  - libraries=places enables the Places Autocomplete used by filters.js
  - loading=async defers init until google.maps is ready
-->
<script async
  src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&libraries=places&loading=async">
</script>

<!--
  JS modules converted from ES-module format to regular scripts.
  Load order matters: each module must be present before apartment_script.js
  initializes them.
-->
<script src="{% static 'js/apartment_map_manager.js' %}"></script>
<script src="{% static 'js/apartment_cards_renderer.js' %}"></script>
<script src="{% static 'js/apartment_filter_manager.js' %}"></script>
<script src="{% static 'js/apartment_listing_detail.js' %}"></script>
<script src="{% static 'js/apartment_create_modal.js' %}"></script>
<!-- Entry point: fetches data, wires all modules together -->
<script src="{% static 'js/apartment_script.js' %}"></script>

{% endblock %}
